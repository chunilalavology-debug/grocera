# Example nginx site for Grocera on a Hostinger VPS (production: zippyyy.com).
#
# Install: sudo apt install nginx certbot python3-certbot-nginx
# Copy to /etc/nginx/sites-available/grocera then:
#   sudo ln -s /etc/nginx/sites-available/grocera /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d zippyyy.com -d www.zippyyy.com
#
# Node listens on 127.0.0.1:5000 with LISTEN_HOST=127.0.0.1 in backend/.env
#
# IMPORTANT: Do NOT set "Connection upgrade" on every request — that breaks normal
# GET/POST proxying to Express and often surfaces as nginx 500 while curl to :5000 works.
# Optional WebSocket map (put once inside http { } in nginx.conf if you need WS):
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
# Then use: proxy_set_header Upgrade $http_upgrade;
#            proxy_set_header Connection $connection_upgrade;

upstream grocera_node {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name zippyyy.com www.zippyyy.com;

    client_max_body_size 25M;

    location / {
        proxy_pass http://grocera_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Let nginx manage Connection for keepalive to Node (see note above).
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        # Avoid buffer issues on large responses / headers
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;
    }
}
